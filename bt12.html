<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài tập 12 - Javascript 02</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h2 {
            margin-top: 24px;
            color: #333;
        }

        button {
            margin-top: 8px;
            padding: 6px 12px;
            cursor: pointer;
        }

        #todo-list li {
            cursor: pointer;
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <!-- Bài 1 -->
    <h2>Bài 1: Nút đổi màu nền</h2>
    <button onclick="changeBg()">Đổi màu nền</button>

    <!-- Bài 2 -->
    <h2>Bài 2: Thông báo chào mừng</h2>
    <button onclick="showWelcome()">Nhấn để chào</button>

    <!-- Bài 3 -->
    <h2>Bài 3: Nhập tên và tuổi</h2>
    <button onclick="nhapThongTin()">Nhập tên &amp; tuổi</button>
    <p id="ketqua-bai3"></p>

    <!-- Bài 4 -->
    <h2>Bài 4: To-do list đơn giản</h2>
    <input type="text" id="todo-input" placeholder="Nhập công việc...">
    <button onclick="addTodo()">Thêm</button>
    <ul id="todo-list"></ul>
    <p><i>Gợi ý: nhấn vào từng công việc để xóa.</i></p>

    <!-- Bài 5 -->
    <h2>Bài 5: Kiểm tra bội của 3 hoặc 7</h2>
    <input type="number" id="number-input" placeholder="Nhập số...">
    <button onclick="checkMultiple()">Kiểm tra</button>
    <p id="ketqua-bai5"></p>

    <script>
        // Bài 1
        function changeBg() {
            document.body.style.backgroundColor = "#cfe8ff"; // xanh dương nhạt
        }

        // Bài 2
        function showWelcome() {
            alert("Chào mừng bạn đến với trang web!");
        }

        // Bài 3
        function nhapThongTin() {
            const name = prompt("Nhập tên của bạn:");
            const age = prompt("Nhập tuổi của bạn:");
            if (name && age) {
                document.getElementById("ketqua-bai3").innerHTML =
                    "<b>" + name + "</b> - <u>" + age + "</u> tuổi";
            } else {
                document.getElementById("ketqua-bai3").innerText = "Bạn chưa nhập đủ thông tin.";
            }
        }

        // Bài 4
        function addTodo() {
            const input = document.getElementById("todo-input");
            const text = input.value.trim();
            if (text === "") return;

            const li = document.createElement("li");
            li.textContent = text;

            // nhấn vào là xóa
            li.addEventListener("click", function () {
                this.remove();
            });

            document.getElementById("todo-list").appendChild(li);
            input.value = "";
            input.focus();
        }

        // Bài 5
        function checkMultiple() {
            const value = document.getElementById("number-input").value;
            const num = Number(value);
            const result = document.getElementById("ketqua-bai5");

            if (isNaN(num)) {
                result.innerText = "Vui lòng nhập một số hợp lệ.";
                return;
            }

            if (num % 3 === 0 || num % 7 === 0) {
                result.innerText = num + " là bội của 3 hoặc 7.";
            } else {
                result.innerText = num + " KHÔNG phải bội của 3 hoặc 7.";
            }
        }
    </script>
</body>

</html>
